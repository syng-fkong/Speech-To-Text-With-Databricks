bundle:
  name: stt-appkit-lakebase

variables:
  postgres_branch:
    description: Full Lakebase Postgres branch resource name. Obtain by running `databricks postgres list-branches projects/{project-id}`, select the desired item from the output array and use its .name value.
  postgres_database:
    description: Full Lakebase Postgres database resource name. Obtain by running `databricks postgres list-databases {branch-name}`, select the desired item from the output array and use its .name value. Requires the branch resource name.

resources:
  apps:
    app:
      name: "stt-appkit-lakebase"
      description: "Node.js app with Lakebase Autoscaling (Postgres) CRUD operations"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to.
      resources:
        - name: postgres
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://adb-7405611527540572.12.azuredatabricks.net
    variables:
      postgres_branch: projects/speech-to-text/branches/production
      postgres_database: projects/speech-to-text/branches/production/databases/db-idxm-pfkiwu5v4q
