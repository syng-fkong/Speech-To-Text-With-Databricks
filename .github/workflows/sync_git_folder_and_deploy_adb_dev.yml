name: Sync Git Folder and Deploy Dev

concurrency: dev_environment

# trigger workflow on pushes to the specified branch and paths
on:
  push:
    branches:
      # Set your base branch name here
      - dev
    paths:
      - 'speech_to_text_asset_bundle/**'
      - '.github/workflows/**'

permissions:
  # These permissions are required for workload identity federation.
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 'Sync Git Folder and Deploy Dev'
    environment: Dev
    # ========================================================================
    # REQUIRED ENVIRONMENT CONFIGURATION
    # ========================================================================
    # The following variables and secrets must be configured in the GitHub
    # repository settings under: Settings > Environments > Dev
    #
    # Required Variables:
    #   - DATABRICKS_HOST: The Databricks workspace URL
    #     Example: https://your-workspace.cloud.databricks.com
    #
    # Required Secrets:
    #   - DATABRICKS_CLIENT_ID: The service principal application (client) ID
    #     This is the UUID of the service principal configured for OIDC
    #     authentication with GitHub Actions
    # ========================================================================
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}

    steps:
      
      - uses: actions/checkout@v3
        name: Check Out Branch
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install uv
        run: pip install uv
      
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
       
      # Update command will sync the git folder in Databricks with the branch you specify. (dev)
      - name: Update git folder
        # Set your workspace path and branch name here
        run: databricks repos update /Workspace/Shared/Speech-To-Text-With-Databricks --branch dev
      
      # Validate the asset bundle to ensure it is correctly configured before deployment. 
      # Checks for issues such as missing variables, incorrect configurations, or other potential problems that could cause deployment to fail.
      - name: Validate asset bundle for dev
        working-directory: ./speech_to_text_asset_bundle
        run: databricks bundle validate 
             --target dev 
             --var="service_principal_id=${{ secrets.DATABRICKS_CLIENT_ID }}"
      
      # Planning the deployment allows you to see a preview of the changes that will be made to the Databricks workspace without actually applying them. 
      # This step is crucial for verifying that the intended changes are correct and won't cause any issues in the development environment.
      - name: Plan asset bundle for dev
        working-directory: ./speech_to_text_asset_bundle
        run: databricks bundle plan 
             --target dev 
             --var="service_principal_id=${{ secrets.DATABRICKS_CLIENT_ID }}"
      
      # Bind any pre-existing workspace resources (schema, volume) to the bundle's
      # Terraform state so deploy doesn't try to re-create them. The '|| true'
      # means a bind failure (resource doesn't exist yet) is non-fatal — Terraform
      # will create it normally on the next step.
      - name: Bind existing resources to bundle state
        working-directory: ./speech_to_text_asset_bundle
        run: |
          databricks bundle deployment bind dev "speech_to_text.audio_dev" \
            --target dev \
            --var="service_principal_id=${{ secrets.DATABRICKS_CLIENT_ID }}" \
            --auto-approve || true
          databricks bundle deployment bind files "speech_to_text.audio_dev.files" \
            --target dev \
            --var="service_principal_id=${{ secrets.DATABRICKS_CLIENT_ID }}" \
            --auto-approve || true

      # Deploy the asset bundle to the development environment.
      # The --auto-approve flag allows the deployment to proceed without manual confirmation, which is useful for automated workflows.
      - name: Deploy asset bundle to dev
        working-directory: ./speech_to_text_asset_bundle
        run: databricks bundle deploy --auto-approve
             --target dev
             --var="service_principal_id=${{ secrets.DATABRICKS_CLIENT_ID }}"
