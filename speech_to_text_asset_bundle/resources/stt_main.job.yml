# Main orchestration job for speech_to_text_asset_bundle.
#
# Runs the full end-to-end pipeline in four steps (steps 3a and 3b run in parallel):
#
#   1. run_audio_transcription_pipeline  — picks up new audio files from the Volume,
#                                          transcribes them with Whisper (ai_query),
#                                          and writes silver_audio_transcription.
#
#   2. run_nlp_enrichment_pipeline       — enriches every new transcription and writes:
#                                            • silver_audio_nlp_ai_func  (AI SQL functions)
#                                            • silver_audio_nlp_ai_query (Foundation Model)
#
#   3a. run_gold_layer_pipeline          — builds the gold layer from the enriched silver tables:
#                                            • gold_audio_sentiment_analysis (detail)
#                                            • gold_audio_daily_stats        (daily aggregation)
#                                            • gold_audio_sentiment_by_topic (cross-tab)
#
#   3b. evaluate_nlp_quality             — runs the MLflow GenAI evaluation notebook and logs
#                                          results to /Shared/nlp-quality-evaluation.
#
# All pipeline steps run a triggered update: they process all pending data since the
# last checkpoint, then stop. No always-on compute is required.

resources:
  jobs:
    stt_main:
      name: stt_main
      description: >-
        End-to-end Speech-To-Text orchestration job. Runs three sequential steps:
        (1) ingest audio files from the Unity Catalog Volume and transcribe them with Whisper via
        stt_audio_transcription; (2) enrich every transcription with sentiment, summary, entities,
        topic, and translation via stt_nlp_enrichment (AI SQL functions and Foundation Model API
        in parallel); (3) compare both NLP implementations using MLflow GenAI evaluation and log
        results to /Shared/nlp-quality-evaluation.

      # Job-level parameters — overridden per target in databricks.yml.
      # Values are injected into the evaluation notebook via base_parameters below.
      # NOTE: pipeline tasks (run_audio_transcription_pipeline, run_nlp_enrichment_pipeline)
      # do NOT receive these — they use their pipeline configuration block, which is
      # resolved at bundle deploy time.
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        # ── Step 1: ingest audio and produce transcriptions ───────────────────
        # Auto Loader detects new files in the Unity Catalog Volume,
        # calls the Whisper endpoint via ai_query(), and appends rows to
        # silver_audio_transcription. Runs on serverless compute.
        - task_key: run_audio_transcription_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.stt_audio_transcription.id}

        # ── Step 2: NLP enrichment ────────────────────────────────────────────
        # Runs only after the ingestion update succeeds.
        # Reads the new transcription rows and produces both silver NLP tables.
        - task_key: run_nlp_enrichment_pipeline
          depends_on:
            - task_key: run_audio_transcription_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.stt_nlp_enrichment.id}

        # ── Step 3a: build gold layer ─────────────────────────────────────────
        # Runs in parallel with evaluate_nlp_quality, after NLP enrichment succeeds.
        # Reads silver_audio_nlp_ai_func and silver_audio_transcription to produce:
        #   • gold_audio_sentiment_analysis  — full detail with flattened entities
        #   • gold_audio_daily_stats         — daily aggregation by topic / sentiment
        #   • gold_audio_sentiment_by_topic  — sentiment cross-tab per business domain
        - task_key: run_gold_layer_pipeline
          depends_on:
            - task_key: run_nlp_enrichment_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.stt_gold_layer.id}

        # ── Step 3b: evaluate NLP quality via MLflow ──────────────────────────
        # Runs after the gold layer succeeds: Phase 5 of the NLP Verdict
        # Workbench reads gold_nlp_human_verdicts, which the gold pipeline
        # materialises from Lakebase via UC federation. Previously parallel
        # to the gold layer; sequenced so human-verdict metrics see the
        # latest snapshot.
        # Reads silver_audio_nlp_ai_func, silver_audio_nlp_ai_query, and
        # gold_nlp_human_verdicts; scores with deterministic validators,
        # LLM judges, and human-verdict win rates; logs to MLflow.
        - task_key: evaluate_nlp_quality
          depends_on:
            - task_key: run_gold_layer_pipeline
          notebook_task:
            notebook_path: ../src/stt_nlp_evaluation/evaluation/nlp_quality_evaluation.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema:  "{{job.parameters.schema}}"
          environment_key: serverless_env

      # Serverless Python environment for the evaluation notebook.
      # Requires mlflow[databricks] >= 3.1.0 for mlflow.genai — install it by
      # adding it to the dependencies list below.
      environments:
        - environment_key: serverless_env
          spec:
            client: "1"
            dependencies:
              - "mlflow[databricks]>=3.1.0"
