# This is a Databricks asset bundle definition for speech_to_text_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: speech_to_text_asset_bundle
  uuid: 7c8f3a2e-9d4b-4e1f-a6c5-8b2d7e9f1a3c

include:
  - resources/*.yml
  - resources/*/*.yml
  - databricks.*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use for Speech To Text With Databrikcs solution.
    default: speech_to_text
  schema:
    description: The schema to use for Speech To Text With Databricks solution.
    default: audio
  service_principal_id:
    description: The Application ID (UUID) of the service principal for production
  stt_model:
    description: Name of the Whisper Model Serving endpoint used by the pipeline for audio transcription via ai_query().
    default: stt-whisper-large-v3
  nlp_model:
    description: Name of the Databricks Foundation Model API endpoint used for NLP tasks via ai_query(). Must be an already-available shared endpoint (no deployment required).
    default: databricks-meta-llama-3-3-70b-instruct
  gold_nlp_source_table:
    description: >-
      Name of the silver NLP table used as the source for the gold layer detail table.
      Must be one of: silver_audio_nlp_ai_query (Foundation Model API — richer summaries)
      or silver_audio_nlp_ai_func (AI SQL functions — shorter, faster).
    default: silver_audio_nlp_ai_query
  warehouse_id:
    description: SQL warehouse used to run dashboard queries and the Genie Space.
    lookup:
      warehouse: Serverless Starter Warehouse
  genie_space_name:
    description: Display name of the Genie Space for natural language exploration of the gold-layer tables.
    default: Speech to Text Analytics


# ============================================================
# TOP-LEVEL RESOURCES
# ============================================================
# Resources defined here are shared across ALL targets (dev, prod).
# The endpoint name is driven by var.stt_model so that changing
# the endpoint in one place (variables section above) propagates
# to both the serving endpoint resource and the pipeline configuration.
# ============================================================
resources:
  model_serving_endpoints:
    stt_whisper_endpoint:
      name: "${var.stt_model}"
      description: >-
        Whisper Large V3 speech-to-text serving endpoint. Transcribes raw audio
        files (wav, mp3, flac, m4a, ogg, mp4) uploaded to the Unity Catalog Volume
        and called by the silver_audio_transcription pipeline table via ai_query().
      tags:
        - key: project
          value: speech-to-text

      config:
        served_entities:
          # --------------------------------------------------------
          # Whisper Large V3 — Foundation Model from system.ai
          # --------------------------------------------------------
          # system.ai is the Databricks-managed Unity Catalog that
          # hosts pre-built Foundation Models (no model registration
          # required). Whisper Large V3 is OpenAI's state-of-the-art
          # multilingual speech-to-text model.
          # --------------------------------------------------------
          - entity_name: system.ai.whisper_large_v3
            entity_version: "3"
            # GPU_SMALL: 1x T4 GPU — sufficient for Whisper inference
            # Options: GPU_SMALL | GPU_MEDIUM | GPU_LARGE | MULTIGPU_MEDIUM
            workload_type: GPU_SMALL
            # Small cluster size; scale up to Medium/Large for higher throughput
            workload_size: Small
            # Scale to zero when no traffic to avoid idle GPU costs
            scale_to_zero_enabled: true

      # ── AI Gateway ───────────────────────────────────────────────────────────
      # Inference tables log every request and response to a Delta table in
      # Unity Catalog at: {catalog}.{schema}.{table_name_prefix}_payload
      # Useful for monitoring transcription quality, auditing, and retraining.
      #
      # usage_tracking_config logs token/request counts to the Databricks
      # usage dashboard (no extra storage cost).
      # ─────────────────────────────────────────────────────────────────────
      ai_gateway:
        inference_table_config:
          enabled: true
          catalog_name: ${var.catalog}
          schema_name: ${var.schema}
          table_name_prefix: ${var.stt_model}
        usage_tracking_config:
          enabled: true

      permissions:
        # Allow all workspace users to query the endpoint
        - level: CAN_QUERY
          group_name: users


# ============================================================
# TARGETS
# ============================================================
# Targets define different deployment environments (dev, prod, etc.) with their specific configurations.
# Each target can have different settings for run_as, presets, variables, and resource definitions.
# Use 'databricks bundle deploy --target <target_name>' to deploy to a specific environment.
targets:
  dev:
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.

    default: true
    #mode: development # development mode automatically sets pipelines_development to true in presets, but you can also set it manually if you want to use production mode with development settings for pipelines.

    presets:
      # name_prefix: 'd_' # optional prefix added to all resource names, useful for testing to avoid name collisions with prod resources or other developers' resources. Uncomment to activate.
      pipelines_development: true # set development to true for pipelines
      trigger_pause_status: PAUSED # set pause_status to PAUSED for all triggers and schedules
      jobs_max_concurrent_runs: 10 # set max_concurrent runs to 10 for all jobs
      tags:
        project: speech-to-text

    # Note: workspace.host is not specified here because the bundle automatically uses the workspace where the code is deployed (based on your Databricks CLI profile or current context)
    workspace:
      #host
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}

    # define resouces like: pipelines, schemas, volumes etc.
    resources:
      pipelines:
        stt_audio_transcription:
          name: stt_audio_transcription
          configuration:
            catalog: ${var.catalog}
            schema: ${var.schema}
            schema_location_base: /Volumes/${var.catalog}/${var.schema}/files/_schema_metadata
            stt_model: ${var.stt_model}

        stt_nlp_enrichment:
          name: stt_nlp_enrichment
          configuration:
            catalog: ${var.catalog}
            schema: ${var.schema}
            nlp_model: ${var.nlp_model}

        stt_gold_layer:
          name: stt_gold_layer
          configuration:
            catalog: ${var.catalog}
            schema: ${var.schema}
            nlp_source_table: ${var.gold_nlp_source_table}
      
      jobs:
        # this job orchestrates the execution of the pipelines and it includes notebook/script tasks for additional orchestration, monitoring, or alerting logic. 
        # It receives parameters that can be forwarded to notebook/script tasks via base_parameters, but pipeline tasks receive configuration from the pipeline definition above, resolved at bundle deploy time.
        stt_main:
          name: stt_main
          parameters:
            - name: catalog
              default: ${var.catalog}
            - name: schema
              default: ${var.schema}

      schemas:
        dev:
          name: ${var.schema}
          catalog_name: ${var.catalog}
          comment: 'Schema for development of speech to text'

      volumes:
        files:
          name: files
          catalog_name: ${var.catalog}
          schema_name: ${var.schema}
          volume_type: MANAGED
          comment: 'Volume for storing files in development environment'
    

  prod:
    run_as:
      service_principal_name: ${var.service_principal_id}

    presets:
      pipelines_development: false # set development to false for pipelines
      trigger_pause_status: PAUSED # set pause_status to PAUSED for all triggers and schedules
      jobs_max_concurrent_runs: 10 # set max_concurrent runs to 10 for all jobs
      tags:
        project: speech-to-text

    mode: production

    # Note: workspace.host is not specified here because the bundle automatically uses the workspace where the code is deployed (based on your Databricks CLI profile or current context)
    workspace:
      #host
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}

    
        # define resouces like: schemas etc.
    resources:
      pipelines:
        stt_audio_transcription:
          name: stt_audio_transcription
          configuration:
            catalog: ${var.catalog} 
            schema: ${var.schema}
            schema_location_base: /Volumes/${var.catalog}/${var.schema}/files/_schema_metadata
            stt_model: ${var.stt_model}

        stt_nlp_enrichment:
          name: stt_nlp_enrichment
          configuration:
            catalog: ${var.catalog}
            schema: ${var.schema}
            nlp_model: ${var.nlp_model}

        stt_gold_layer:
          name: stt_gold_layer
          configuration:
            catalog: ${var.catalog}
            schema: ${var.schema}
            nlp_source_table: ${var.gold_nlp_source_table}

      jobs:
        stt_main:
          # NOTE: job-level parameters are forwarded ONLY to notebook and script tasks
          # via base_parameters. Pipeline tasks do NOT receive these — they use the
          # pipeline configuration block above, resolved at bundle deploy time.
          parameters:
            - name: catalog
              default: ${var.catalog}
            - name: schema
              default: ${var.schema}

      schemas:
        prod:
          name: ${var.schema}
          catalog_name: ${var.catalog}
          comment: 'Schema for production'


    # OPTIONAL: Grant a human admin CAN_MANAGE on all prod bundle resources.
    # Useful when resources are owned by the service principal but a platform
    # engineer also needs to manage, trigger or modify them from the workspace UI.
    # To activate:
    #   1. Add admin_user_email to the variables section above (no default).
    #   2. Uncomment the block below.
    #   3. Add --var="admin_user_email=${{ vars.ADMIN_USER_EMAIL }}" to the
    #      prod deploy command in .github/workflows/sync_git_folder_and_deploy_adb_prod.yml.
    #permissions:
    #  - user_name: ${var.admin_user_email}
    #    level: CAN_MANAGE
